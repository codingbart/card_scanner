name: Build CardScanner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Tesseract OCR
        run: choco install tesseract -y

      - name: Download Polish tessdata
        run: |
          curl -L -o "C:\Program Files\Tesseract-OCR\tessdata\pol.traineddata" https://github.com/tesseract-ocr/tessdata/raw/main/pol.traineddata
        shell: cmd

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build exe
        run: |
          python -c "import sys; print(sys.base_prefix)"
          pyinstaller run_desktop.py ^
            --name=CardScanner ^
            --console ^
            --onedir ^
            --noconfirm ^
            --add-data "templates;templates" ^
            --add-data "static;static" ^
            --add-binary "C:\Program Files\Tesseract-OCR\tesseract.exe;tesseract\bin" ^
            --add-data "C:\Program Files\Tesseract-OCR\tessdata\eng.traineddata;tesseract\tessdata" ^
            --add-data "C:\Program Files\Tesseract-OCR\tessdata\pol.traineddata;tesseract\tessdata" ^
            --hidden-import=pytesseract ^
            --hidden-import=PIL ^
            --hidden-import=webview ^
            --collect-all=webview
        shell: cmd

      - name: Copy Python DLL to dist
        run: |
          copy "%PYTHON_PATH%\python312.dll" "dist\CardScanner\" 2>nul
          copy "%PYTHON_PATH%\python3.dll" "dist\CardScanner\" 2>nul
          dir dist\CardScanner\*.dll
        shell: cmd
        env:
          PYTHON_PATH: ${{ env.pythonLocation }}

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: CardScanner-Windows
          path: dist/CardScanner/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Tesseract OCR
        run: |
          brew install tesseract
          curl -L -o "$(brew --prefix tesseract)/share/tessdata/pol.traineddata" https://github.com/tesseract-ocr/tessdata/raw/main/pol.traineddata

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build app
        run: |
          TESS_BIN=$(which tesseract)
          TESS_DATA=$(brew --prefix tesseract)/share/tessdata
          pyinstaller run_desktop.py \
            --name=CardScanner \
            --windowed \
            --onedir \
            --noconfirm \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --add-binary "$TESS_BIN:tesseract/bin" \
            --add-data "$TESS_DATA/eng.traineddata:tesseract/tessdata" \
            --add-data "$TESS_DATA/pol.traineddata:tesseract/tessdata" \
            --hidden-import=pytesseract \
            --hidden-import=PIL \
            --hidden-import=webview

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: CardScanner-macOS
          path: dist/CardScanner.app/
